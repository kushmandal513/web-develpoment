<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#2f09ef;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
    }

    .container{
        width:450px;
        background:rgb(70, 27, 241);
        padding:25px;
        border-radius:10px;
        box-shadow:0 0 15px rgba(0,0,0,.2);
    }

    h2{
        text-align:center;
        margin-bottom:20px;
    }

    .input-box{
        margin-bottom:15px;
    }

    label{
        display:block;
        margin-bottom:5px;
        font-weight:bold;
    }

    input, textarea, select{
        width:100%;
        padding:10px;
        border:1px solid #3700ff;
        border-radius:5px;
        font-size:15px;
    }

    input:invalid{
        border-color:rgb(0, 0, 0);
    }

    input:valid{
        border-color:rgb(1, 2, 1);
    }

    textarea{
        resize:none;
    }

    button{
        width:100%;
        padding:12px;
        background:#007bff;
        color:rgb(237, 237, 245);
        border:none;
        border-radius:5px;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#0056b3;
    }

    .error{
        color:red;
        font-size:13px;
    }
</style>
</head>

<body>

<div class="container">

<h2>Registration Form</h2>

<form id="myForm">

<div class="input-box">
<label>Full Name</label>
<input
type="text"
id="name"
required
minlength="3"
maxlength="30"
pattern="[A-Za-z ]+"
placeholder="Enter your name">
</div>

<div class="input-box">
<label>Email</label>
<input
type="email"
id="email"
required
placeholder="example@gmail.com">
</div>

<div class="input-box">
<label>Password</label>
<input
type="password"
id="password"
required
minlength="8"
pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
placeholder="Minimum 8 characters">
</div>

<div class="input-box">
<label>Confirm Password</label>
<input
type="password"
id="confirmPassword"
required
placeholder="Re-enter password">
</div>

<div class="input-box">
<label>Phone Number</label>
<input
type="tel"
id="phone"
required
pattern="[0-9]{10}"
placeholder="10-digit number">
</div>

<div class="input-box">
<label>Age</label>
<input
type="number"
id="age"
required
min="18"
max="60">
</div>

<div class="input-box">
<label>Date of Birth</label>
<input
type="date"
id="dob"
required>
</div>

<div class="input-box">
<label>Gender</label>
<select id="gender" required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="input-box">
<label>Website</label>
<input
type="url"
id="website"
required
placeholder="https://example.com">
</div>

<div class="input-box">
<label>Address</label>
<textarea
id="address"
required
minlength="10"
rows="4"
placeholder="Enter address"></textarea>
</div>

<div class="input-box">
<input type="checkbox" id="terms" required>
<label for="terms">I agree to the Terms & Conditions</label>
</div>

<button type="submit">Register</button>

</form>

</div>

<script>

document.getElementById("myForm").addEventListener("submit", function(e){

    let password=document.getElementById("password").value;
    let confirm=document.getElementById("confirmPassword").value;

    if(password!==confirm){
        alert("Passwords do not match!");
        e.preventDefault();
        return;
    }

    alert("Form Submitted Successfully!");

});

</script>

</body>
</html>
